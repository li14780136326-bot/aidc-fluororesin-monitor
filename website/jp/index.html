<!DOCTYPE html>
<html lang="ja-JP">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AIDC + フッ素樹脂材料 インテリジェンス</title>
<link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>
<script>if(sessionStorage.getItem('aidc_auth')!=='1'){location.replace('/');}</script>

<div class="app-container">

  <nav class="nav">
    <a href="index.html" class="nav-brand">
      <span class="nav-logo">A/F</span>
      <span class="nav-title">AIDC + フッ素樹脂材料 インテリジェンス</span>
    </a>
    <ul class="nav-links">
      <li><a href="index.html" class="active">ホーム</a></li>
      <li><a href="daily.html">日報</a></li>
      <li><a href="knowledge.html">ナレッジマップ</a></li>
	      <li><a href="architecture.html">アーキテクチャ</a></li>
    </ul>
    <div class="nav-lang">
      <a href="../cn/index.html">中</a>
      <a href="index.html" class="active">日</a>
    </div>
  </nav>

  <div class="section-header">
    <span class="label">本日のデータ</span>
    <span id="snapshotDate" style="font-family:var(--font-mono);font-size:12px;color:var(--text-tertiary);font-weight:400;">—</span>
  </div>
  <div class="stats-row" id="statsRow"></div>

  <hr class="section-divider">

  <div class="section-header">
    <span class="label">トピック活発度</span>
  </div>
  <div class="pulse-row" id="categoryPulse"></div>

  <hr class="section-divider">

  <div class="content-grid">
    <div>
      <div class="section-header">
        <span class="label">主要な発見</span>
      </div>
      <div id="keyFindings">
        <div class="empty-state">
          <svg class="state-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><circle cx="12" cy="12" r="3"/><path d="M12 1v4M12 19v4M4.22 4.22l2.83 2.83M16.95 16.95l2.83 2.83M1 12h4M19 12h4"/></svg>
          <p>データ収集中、しばらくお待ちください</p>
        </div>
      </div>
    </div>

    <aside class="sidebar">
      <div class="sidebar-section">
        <div class="sb-title">最近の日報</div>
        <div id="recentReports">
          <div class="report-list-item" style="color:var(--text-tertiary);">読み込み中...</div>
        </div>
      </div>
      <div class="sidebar-section">
        <div class="sb-title">ソース状態</div>
        <div class="source-status-row"><span>Exa 検索</span><span class="ok">正常</span></div>
        <div class="source-status-row"><span>RSS 集約</span><span class="ok">正常</span></div>
        <div class="source-status-row"><span>Jina Reader</span><span class="ok">正常</span></div>
        <div class="source-status-row"><span>Bilibili</span><span class="warn">一部</span></div>
        <div class="source-status-row"><span>V2EX</span><span class="ok">正常</span></div>
      </div>
    </aside>
  </div>

  <footer class="footer">
    <p>AIDC + Fluororesin Intelligence Monitor</p>
    <p>データソース: Exa 検索 · RSS 集約 · Jina Reader · Bilibili · V2EX</p>
  </footer>
</div>

<script src="../assets/js/i18n.js"></script>
<script src="../assets/js/data-loader.js"></script>
<script>
(async function() {
  var lang = 'jp', DL = window.DataLoader;
  var reports = await DL.loadDailyIndex();
  if (!reports || !reports.length) reports = DL.getSampleDailyIndex();
  var latest = reports[0] || {};
  document.getElementById('snapshotDate').textContent = latest.date || '—';
  DL.renderStatsRow('statsRow', latest, lang);
  DL.renderCategoryPulse('categoryPulse', latest.categories, lang);
  DL.renderReportList('recentReports', reports, lang);

  var el = document.getElementById('keyFindings');
  if (latest.date) {
    var rd = await DL.loadReport(latest.date);
    if (rd && rd.key_findings && rd.key_findings.length) {
      var h = '';
      rd.key_findings.slice(0, 8).forEach(function(f) {
        var imp = 'importance-' + (f.importance || 'medium');
        var bc = f.confidence === 'verified' ? 'badge-verified' : (f.confidence === 'single_source' ? 'badge-single' : 'badge-unverified');
        var bt = f.confidence === 'verified' ? '検証済み' : (f.confidence === 'single_source' ? '単一ソース' : '未検証');
        h += '<div class="finding-item '+imp+'"><div class="finding-title"><a href="'+(f.url||'#')+'" target="_blank" rel="noopener">'+(f.title||'')+'</a></div>' +
          '<div class="finding-meta"><span class="finding-badge '+bc+'">'+bt+'</span><span class="finding-badge badge-category">'+(window.getCategoryName(f.category,'jp')||'')+'</span><span>'+(f.source_domain||'')+'</span><span>信頼度: '+(f.credibility_score||'—')+'/5</span></div></div>';
      });
      el.innerHTML = h;
    }
  } else {
    el.innerHTML =
      '<div class="finding-item importance-high"><div class="finding-title"><a href="#">NVIDIA Rubin 相互接続アーキテクチャ更新：銅ケーブル比率65%に</a></div><div class="finding-meta"><span class="finding-badge badge-verified">検証済み</span><span class="finding-badge badge-category">銅ケーブル</span><span>semianalysis.com</span><span>信頼度: 4/5</span></div></div>' +
      '<div class="finding-item importance-high"><div class="finding-title"><a href="#">永和股份、FEP生産能力を年4200トンに拡張</a></div><div class="finding-meta"><span class="finding-badge badge-verified">検証済み</span><span class="finding-badge badge-category">フッ素樹脂</span><span>eastmoney.com</span><span>信頼度: 3/5</span></div></div>' +
      '<div class="finding-item importance-medium"><div class="finding-title"><a href="#">日本のPFAS規制改正：フッ素ポリマーに2028年までの適用除外</a></div><div class="finding-meta"><span class="finding-badge badge-single">単一ソース</span><span class="finding-badge badge-category">PFAS規制</span><span>nikkei.com</span><span>信頼度: 4/5</span></div></div>' +
      '<div class="finding-item importance-medium"><div class="finding-title"><a href="#">Rogers Corp、Dk 2.2の新世代PTFE高周波PCB基板を発表</a></div><div class="finding-meta"><span class="finding-badge badge-verified">検証済み</span><span class="finding-badge badge-category">高周波PCB</span><span>rogerscorp.com</span><span>信頼度: 5/5</span></div></div>' +
      '<div class="finding-item importance-medium"><div class="finding-title"><a href="#">DC液冷用PFAチューブ需要急増、Chemoursが増産計画を発表</a></div><div class="finding-meta"><span class="finding-badge badge-single">単一ソース</span><span class="finding-badge badge-category">液冷</span><span>bloomberg.com</span><span>信頼度: 3/5</span></div></div>';
  }
})();
</script>
</body>
</html>
