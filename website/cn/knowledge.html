<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>知识图谱 — AIDC + 氟树脂材料 情报监测</title>
<link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>
<script>if(sessionStorage.getItem('aidc_auth')!=='1'){location.replace('/');}</script>

<div class="app-container">
  <nav class="nav">
    <a href="index.html" class="nav-brand">
      <span class="nav-logo">A/F</span>
      <span class="nav-title">AIDC + 氟树脂材料 情报监测</span>
    </a>
    <ul class="nav-links">
      <li><a href="index.html">首页</a></li>
      <li><a href="daily.html">日报</a></li>
      <li><a href="knowledge.html" class="active">知识图谱</a></li>
	      <li><a href="architecture.html">架构可视化</a></li>
    </ul>
    <div class="nav-lang">
      <a href="knowledge.html" class="active">中</a>
      <a href="../jp/knowledge.html">日</a>
    </div>
  </nav>

  <!-- Hero -->
  <header class="kg-hero">
    <h1 class="kg-hero-title">知识图谱</h1>
    <p class="kg-hero-sub" id="kgSubtitle">累计追踪 <strong id="kgTotal">—</strong> 篇文章</p>
  </header>

  <!-- Weekly Synthesis (conditionally shown) -->
  <section class="kg-synthesis" id="kgSynthesis" style="display:none">
    <h2 class="kg-section-label">本周情报梳理</h2>
    <div class="kg-synthesis-body" id="kgSynthesisBody"></div>
  </section>

  <!-- Topic Clusters -->
  <section class="kg-section">
    <h2 class="kg-section-label">主题集群</h2>
    <div class="kg-topic-list" id="kgTopicList">
      <p class="kg-empty">加载中...</p>
    </div>
  </section>

  <!-- Companies -->
  <section class="kg-section">
    <h2 class="kg-section-label">追踪公司</h2>
    <div class="kg-company-list" id="kgCompanyList">
      <p class="kg-empty">加载中...</p>
    </div>
  </section>

  <!-- Tag Cloud -->
  <section class="kg-section">
    <h2 class="kg-section-label">标签云</h2>
    <div class="kg-tag-cloud" id="kgTagCloud"></div>
  </section>

  <footer class="footer">
    <p>AIDC + Fluororesin Intelligence Monitor</p>
    <p>每周一 07:00 (北京时间) 自动更新</p>
  </footer>
</div>

<script src="../assets/js/i18n.js"></script>
<script src="../assets/js/data-loader.js"></script>
<script>
(function() {
  var DL = window.DataLoader;

  async function init() {
    var k = await DL.loadKnowledgeIndex();
    if (!k || !k.topics || !k.topics.length) k = DL.getSampleKnowledgeIndex();

    document.getElementById('kgTotal').textContent = k.total_articles || 0;

    // ── Weekly Synthesis ──
    var syn = k.weekly_synthesis;
    if (syn && syn.overview_cn) {
      document.getElementById('kgSynthesis').style.display = '';
      var synHtml = '<p class="kg-synthesis-p">' + syn.overview_cn.replace(/\n\n/g, '</p><p class="kg-synthesis-p">') + '</p>';
      if (syn.key_developments && syn.key_developments.length) {
        synHtml += '<ul class="kg-synthesis-list">';
        syn.key_developments.forEach(function(d) {
          synHtml += '<li>' + d.title_cn + '</li>';
        });
        synHtml += '</ul>';
      }
      document.getElementById('kgSynthesisBody').innerHTML = synHtml;
    }

    // ── Topic Clusters ──
    var topics = (k.topics || []).filter(function(t) { return t.article_count > 0; });
    var tl = document.getElementById('kgTopicList');
    if (topics.length) {
      var th = '';
      topics.forEach(function(t) {
        var recent = (t.recent_titles || []).slice(0, 3);
        var kws = (t.keywords || []).slice(0, 6);
        th += '<div class="kg-topic-row">' +
          '<div class="kg-topic-main">' +
            '<a href="topic.html?id=' + t.id + '" class="kg-topic-name">' + (t.name || '') + '</a>' +
            '<span class="kg-topic-count">' + (t.article_count || 0) + ' 篇</span>' +
            (t.last_updated ? '<span class="kg-topic-updated">更新于 ' + t.last_updated.substring(0,10) + '</span>' : '') +
          '</div>' +
          (kws.length ? '<div class="kg-topic-kw">' + kws.map(function(k){return '<span class="kg-kw-tag">'+k+'</span>';}).join('') + '</div>' : '') +
          (recent.length ? '<div class="kg-topic-recent">' + recent.map(function(rt){return '<a href="#" class="kg-topic-link">'+rt+'</a>';}).join('') + '</div>' : '') +
        '</div>';
      });
      tl.innerHTML = th;
    } else {
      tl.innerHTML = '<p class="kg-empty">暂无主题数据</p>';
    }

    // ── Company List ──
    var companies = k.companies || [];
    var cl = document.getElementById('kgCompanyList');
    if (companies.length) {
      var ch = '';
      companies.forEach(function(c) {
        var recent = (c.recent_articles || []).slice(0, 3);
        ch += '<div class="kg-co-row">' +
          '<div class="kg-co-header">' +
            '<span class="kg-co-name">' + (c.name || '') + '</span>' +
            '<span class="kg-co-ticker">' + (c.ticker || '') + '</span>' +
            '<span class="kg-co-count">' + (c.mention_count || 0) + ' 条动态</span>' +
          '</div>';
        if (recent.length) {
          ch += '<div class="kg-co-articles">';
          recent.forEach(function(r) {
            ch += '<a href="' + (r.url || '#') + '" target="_blank" rel="noopener" class="kg-co-link"><span class="kg-co-date">' + (r.date || '') + '</span>' + (r.title || '').substring(0, 70) + '</a>';
          });
          ch += '</div>';
        }
        ch += '</div>';
      });
      cl.innerHTML = ch;
    } else {
      cl.innerHTML = '<p class="kg-empty">积累更多数据后显示公司动态</p>';
    }

    // ── Tag Cloud ──
    var tags = k.tag_cloud || [];
    var tc = document.getElementById('kgTagCloud');
    if (tags.length) {
      var max = Math.max.apply(null, tags.map(function(t){return t.count;}));
      tags.forEach(function(t) {
        var weight = t.count / max;
        var size = 0.7 + weight * 0.9;
        var opacity = 0.35 + weight * 0.55;
        tc.innerHTML += '<span class="kg-tag" style="font-size:' + size.toFixed(2) + 'rem;opacity:' + opacity.toFixed(2) + '">' + t.tag + '</span>';
      });
    } else {
      tc.innerHTML = '<p class="kg-empty">积累更多数据后生成标签云</p>';
    }
  }

  init();
})();
</script>
</body>
</html>
